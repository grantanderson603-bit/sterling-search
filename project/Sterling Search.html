<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="lime" data-sidebar="expanded" data-density="regular" data-panel="right">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sterling Search — second brain · search · browser</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* page background — calm paper for the desktop the window sits on */
    html, body { height: 100%; width: 100%; }
    body {
      background:
        radial-gradient(1200px 700px at 50% 100%, #DCDAD2 0%, #F2F1EC 60%, #F2F1EC 100%);
      min-height: 100vh;
      width: 100vw;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      overflow: hidden;
    }
    /* fit-to-viewport scaler — the canvas is 1320×860 + a caption,
       transformed down to fit any preview pane proportionally. */
    .scaler {
      transform-origin: center center;
      will-change: transform;
    }
    .stage {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      width: 1320px;
    }
    .stage-caption {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--ink-3);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex; gap: 18px; align-items: center;
    }
    .stage-caption b { color: var(--ink); font-weight:600; }
    .stage-caption .dot { width: 4px; height: 4px; background: var(--ink-3); border-radius: 50%; }
  </style>
</head>
<body style="background-color: rgb(255, 255, 255)">

<div class="scaler" id="scaler"><div class="stage">
  <div class="window">
    <div class="titlebar">
      <div class="traffic"><i class="c"></i><i class="y"></i><i class="g"></i></div>
      <div class="titlebar-title">STERLING SEARCH</div>
      <div class="titlebar-right"><span>1.4 β</span></div>
    </div>
    <div id="root"></div>
  </div>
  <div class="stage-caption">
    <span><b>Sterling Search</b></span>
    <span class="dot"></span>
    <span>Interactive prototype</span>
    <span class="dot"></span>
    <span>⌘K · ⌘J · ⌘U</span>
    <span class="dot"></span>
    <span>Tweaks panel · bottom right →</span>
  </div>
</div></div>

<script>
  // Fit-to-viewport scaling. Designs at 1320×900 (window 860 + caption ~40).
  (function() {
    const DESIGN_W = 1320;
    const DESIGN_H = 920;
    const scaler = document.getElementById('scaler');
    function fit() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const s = Math.min(vw / DESIGN_W, vh / DESIGN_H, 1);
      scaler.style.transform = 'scale(' + s + ')';
      // Compensate the tweaks panel so it doesn't shrink off-screen.
      document.documentElement.style.setProperty('--dc-inv-zoom', String(1 / s));
    }
    fit();
    window.addEventListener('resize', fit);
  })();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  // Mount last, after every component is registered on window.
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

</body>
</html>
